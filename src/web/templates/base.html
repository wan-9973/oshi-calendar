<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="theme-color" content="#FBF9F7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&amp;family=Zen+Maru+Gothic:wght@500;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="site-header">
  <a class="logo" href="/" aria-label="{{ site_name }} トップへ"><span aria-hidden="true">🗓️</span>{{ site_name }}</a>
  <nav aria-label="メインナビゲーション"><a class="my-list-link" href="/my">マイ推しリスト</a></nav>
</header>
<main>{% block content %}{% endblock %}</main>
<footer class="site-footer">
  <p class="disclaimer">{{ disclaimer }}</p>
  <p class="operator">運営者: {{ operator_name }}</p>
  <p class="affiliate-note">商品リンクは楽天アフィリエイトです</p>
  <div class="credit">{{ credit_snippet | safe }}</div>
</footer>
<button id="back-to-top" class="back-to-top" type="button" aria-label="ページ最上部へ戻る" hidden>↑</button>
<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
<div id="page-skeleton" class="page-skeleton" aria-hidden="true" hidden>
  <div class="skeleton-shell">
    <div class="skeleton-line skeleton-heading"></div>
    <div class="skeleton-grid">
      {% for _ in range(6) %}
      <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
      {% endfor %}
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
